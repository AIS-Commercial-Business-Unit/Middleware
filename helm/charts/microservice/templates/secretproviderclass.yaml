{{- if and .Values.enabled .Values.keyvault.enabled .Values.keyvault.secrets }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "microservice.fullname" . }}-secrets
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.global.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.global.keyvault.name | quote }}
    tenantId: {{ .Values.global.keyvault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyvault.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ include "microservice.fullname" . }}-secrets
      type: Opaque
      data:
        {{- range .Values.keyvault.secrets }}
        - objectName: {{ .objectName }}
          key: {{ .objectName }}
        {{- end }}
{{- end }}
