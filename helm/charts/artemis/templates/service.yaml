{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "artemis.fullname" . }}
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 61616
      targetPort: openwire
      protocol: TCP
      name: openwire
    - port: 8161
      targetPort: console
      protocol: TCP
      name: console
    - port: 5672
      targetPort: amqp
      protocol: TCP
      name: amqp
  selector:
    {{- include "artemis.selectorLabels" . | nindent 4 }}
{{- end }}
