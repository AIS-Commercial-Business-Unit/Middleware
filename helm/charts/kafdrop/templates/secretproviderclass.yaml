{{- if and .Values.enabled .Values.keyvault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "kafdrop.fullname" . }}-secrets
  labels:
    {{- include "kafdrop.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMAssignedIdentity: "false"
    clientID: {{ .Values.global.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.global.keyvault.name | quote }}
    tenantId: {{ .Values.global.keyvault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyvault.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
        {{- end }}
{{- end }}
