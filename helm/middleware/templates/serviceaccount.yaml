{{/*
Shared ServiceAccount for all middleware pods.
Created once in the umbrella chart to avoid Helm ownership conflicts.
All subcharts reference this SA by name.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: middleware-workload
  labels:
    app.kubernetes.io/part-of: middleware
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.global.workloadIdentity.clientId | quote }}
