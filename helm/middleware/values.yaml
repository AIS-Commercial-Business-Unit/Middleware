##############################################################################
# Middleware Umbrella Chart — Global Defaults
##############################################################################

global:
  registry: ""  # ACR login server, e.g. acrmiddlewaredev.azurecr.io
  namespace: middleware
  workloadIdentity:
    clientId: ""  # From terraform output: workload identity client ID
  keyvault:
    name: ""      # From terraform output: keyvault_name (globally unique, includes random suffix)
    tenantId: ""  # Azure AD tenant ID
  eventhubs:
    bootstrapServers: ""  # e.g. evhns-middleware-dev.servicebus.windows.net:9093
  otel:
    endpoint: "http://otel-collector.observability.svc:4317"
  apim:
    gatewayUrl: ""  # From terraform output: APIM gateway URL
  azure:
    tenantId: ""              # Set per-environment in values-dev.yaml
    clientId: ""              # Workload identity client ID from terraform output
    eventhubsNamespace: ""    # e.g., evhns-middleware-dev
    storageAccountName: ""    # e.g., stmiddlewaredevfiles
    sqlServerFqdn: ""         # From terraform output: sql_server_fqdn (globally unique, includes random suffix)
  ingress:
    # NOTE: APIs now use per-service hostnames (e.g. policy.middleware.internal,
    # file-processing.middleware.internal, integration.middleware.internal,
    # appraisal.middleware.internal). The internalHost entry below is retained
    # for the UI host pattern and any legacy reference; it is no longer the
    # canonical host for backend APIs. See infra/terraform/dns.tf.
    internalHost: "api.middleware.internal"  # Legacy/UI pattern only; APIs use per-service hosts
    publicHost: ""                          # Public DNS (if UI exposed directly)
    staticIp: "10.0.16.10"                  # Reserved from snet-aks-ilb subnet
    ilbSubnetName: "snet-aks-ilb"           # Subnet where ILB gets deployed

##############################################################################
# Java Services
##############################################################################

policy-issuance-service:
  enabled: true
  stack: java
  port: 8081
  image:
    repository: policy-issuance-service
    tag: latest
  serviceAccount:
    name: middleware-workload
  workloadIdentity:
    enabled: true
  keyvault:
    enabled: true
    secrets:
      - objectName: cosmos-mongodb-connection-string
        envVar: SPRING_DATA_MONGODB_URI
      - objectName: appinsights-connection-string
        envVar: APPLICATIONINSIGHTS_CONNECTION_STRING
  env:
    SERVER_PORT: "8081"
    SPRING_PROFILES_ACTIVE: azure
    AZURE_TENANT_ID: "{{ .Values.global.azure.tenantId }}"
    AZURE_CLIENT_ID: "{{ .Values.global.azure.clientId }}"
    AZURE_EVENTHUBS_NAMESPACE: "{{ .Values.global.azure.eventhubsNamespace }}"
    SPRING_KAFKA_BOOTSTRAP_SERVERS: "{{ .Values.global.eventhubs.bootstrapServers }}"
    SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
    SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: OAUTHBEARER
    SPRING_KAFKA_PROPERTIES_SASL_LOGIN_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler
    OTEL_EXPORTER_OTLP_ENDPOINT: "{{ .Values.global.otel.endpoint }}"
    OTEL_SERVICE_NAME: policy-issuance-service
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  ingress:
    enabled: true
    internal: true
    host: "policy.middleware.internal"
    paths:
      - path: /
        pathType: Prefix

