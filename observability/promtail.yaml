server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip leading "/" from container name → use as service_name label
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: service_name
      # Tag all streams with deployment environment for LogQL selector
      - target_label: deployment_environment
        replacement: local
    pipeline_stages:
      # Drop Kafka client heartbeat/disconnect noise to keep Loki clean
      - drop:
          expression: "Node -1 disconnected"
      - drop:
          expression: "Heartbeat"
      # Parse JSON log lines from Logback JSON encoder
      - json:
          expressions:
            level: level
      # Promote log level to a Loki stream label for filtered queries
      - labels:
          level:
