server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: platform-integration-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/integration_db}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: platform-integration-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0

camel:
  springboot:
    main-run-controller: true
  component:
    kafka:
      brokers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  service:
    name: ${OTEL_SERVICE_NAME:platform-integration-service}

duckcreek:
  commercial:
    url: ${DUCKCREEK_COMMERCIAL_URL:localhost:9001}
  personal:
    url: ${DUCKCREEK_PERSONAL_URL:localhost:9002}
forefront:
  url: ${FOREFRONT_URL:localhost:9003}

demo:
  health:
    policy-issuance: ${DEMO_HEALTH_POLICY_ISSUANCE:http://policy-issuance-service:8081}
    platform-compliance: ${DEMO_HEALTH_PLATFORM_COMPLIANCE:http://platform-compliance-service:8082}
    customer-identity: ${DEMO_HEALTH_CUSTOMER_IDENTITY:http://customer-identity-service:8083}
    platform-integration: ${DEMO_HEALTH_PLATFORM_INTEGRATION:http://platform-integration-service:8084}
    billing-finance: ${DEMO_HEALTH_BILLING_FINANCE:http://billing-finance-service:8085}
    platform-notification: ${DEMO_HEALTH_PLATFORM_NOTIFICATION:http://platform-notification-service:8086}
    platform-file-processing: ${DEMO_HEALTH_PLATFORM_FILE_PROCESSING:http://platform-file-processing-service:8087}
    prs-appraisal: ${DEMO_HEALTH_PRS_APPRAISAL:http://prs-appraisal-service:8090}
    dotnet-policy-issuance: ${DEMO_HEALTH_DOTNET_POLICY_ISSUANCE:http://dotnet-policy-issuance:8181}
    dotnet-platform-compliance: ${DEMO_HEALTH_DOTNET_PLATFORM_COMPLIANCE:http://dotnet-platform-compliance:8182}
    dotnet-customer-identity: ${DEMO_HEALTH_DOTNET_CUSTOMER_IDENTITY:http://dotnet-customer-identity:8183}
    dotnet-platform-integration: ${DEMO_HEALTH_DOTNET_PLATFORM_INTEGRATION:http://dotnet-platform-integration:8184}
    dotnet-billing-finance: ${DEMO_HEALTH_DOTNET_BILLING_FINANCE:http://dotnet-billing-finance:8185}
    dotnet-platform-notification: ${DEMO_HEALTH_DOTNET_PLATFORM_NOTIFICATION:http://dotnet-platform-notification:8186}
    dotnet-file-processing: ${DEMO_HEALTH_DOTNET_FILE_PROCESSING:http://dotnet-file-processing:8187}
    dotnet-kafka-bridge: ${DEMO_HEALTH_DOTNET_KAFKA_BRIDGE:http://dotnet-kafka-bridge:8188}
    dotnet-prs-appraisal: ${DEMO_HEALTH_DOTNET_PRS_APPRAISAL:http://dotnet-prs-appraisal:8189}

logging:
  level:
    com.ais.middleware: DEBUG
    org.apache.camel: INFO
