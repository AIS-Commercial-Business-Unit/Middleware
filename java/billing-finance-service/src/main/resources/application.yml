server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: billing-finance-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/billing_finance_db}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: billing-finance-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0

camel:
  springboot:
    main-run-controller: true
  component:
    kafka:
      brokers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  service:
    name: ${OTEL_SERVICE_NAME:billing-finance-service}

crm19x1:
  url: ${CRM19X1_URL:localhost:9007}

logging:
  level:
    com.ais.middleware: DEBUG
    org.apache.camel: INFO

---
spring:
  config:
    activate:
      on-profile: azure
  kafka:
    bootstrap-servers: ${AZURE_EVENTHUBS_NAMESPACE}.servicebus.windows.net:9093
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: OAUTHBEARER
      sasl.login.callback.handler.class: org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
      sasl.oauthbearer.token.endpoint.url: https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
      sasl.jaas.config: >-
        org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required
        clientId="${AZURE_CLIENT_ID}"
        scope="https://${AZURE_EVENTHUBS_NAMESPACE}.servicebus.windows.net/.default";

camel:
  component:
    kafka:
      brokers: ${AZURE_EVENTHUBS_NAMESPACE}.servicebus.windows.net:9093
      additional-properties:
        security.protocol: SASL_SSL
        sasl.mechanism: OAUTHBEARER
        sasl.login.callback.handler.class: org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
        sasl.oauthbearer.token.endpoint.url: https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
        sasl.jaas.config: >-
          org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required
          clientId="${AZURE_CLIENT_ID}"
          scope="https://${AZURE_EVENTHUBS_NAMESPACE}.servicebus.windows.net/.default";
