name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}-plan
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -var="apim_publisher_email=${{ secrets.APIM_PUBLISHER_EMAIL }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: infra/terraform/tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: infra/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Export Terraform Outputs to GitHub Variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          # Extract Terraform outputs
          AKS_NAME=$(terraform output -raw aks_cluster_name)
          RG_NAME=$(terraform output -raw resource_group_name)
          WORKLOAD_CLIENT_ID=$(terraform output -raw workload_identity_client_id)
          ACR_SERVER=$(terraform output -raw acr_login_server)
          KEYVAULT_NAME=$(terraform output -raw keyvault_name)
          SQL_FQDN=$(terraform output -raw sql_server_fqdn)
          APIM_NAME=$(terraform output -raw apim_name)

          # Save as GitHub repository variables (for deploy-apps workflow)
          gh variable set AKS_CLUSTER_NAME --body "$AKS_NAME"
          gh variable set AKS_RESOURCE_GROUP --body "$RG_NAME"
          gh variable set WORKLOAD_IDENTITY_CLIENT_ID --body "$WORKLOAD_CLIENT_ID"
          gh variable set ACR_LOGIN_SERVER --body "$ACR_SERVER"
          gh variable set KEYVAULT_NAME --body "$KEYVAULT_NAME"
          gh variable set SQL_SERVER_FQDN --body "$SQL_FQDN"
          gh variable set APIM_NAME --body "$APIM_NAME"

          echo "### Terraform Outputs Saved" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| AKS_CLUSTER_NAME | $AKS_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| AKS_RESOURCE_GROUP | $RG_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| WORKLOAD_IDENTITY_CLIENT_ID | $WORKLOAD_CLIENT_ID |" >> $GITHUB_STEP_SUMMARY
          echo "| ACR_LOGIN_SERVER | $ACR_SERVER |" >> $GITHUB_STEP_SUMMARY
          echo "| KEYVAULT_NAME | $KEYVAULT_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL_SERVER_FQDN | $SQL_FQDN |" >> $GITHUB_STEP_SUMMARY
          echo "| APIM_NAME | $APIM_NAME |" >> $GITHUB_STEP_SUMMARY
