version: '3.9'

# ============================================================
# AIS Middleware Platform — Local Development Stack
# Run: docker compose up --build
# Platform UI: http://localhost:3000
# Kafka UI (Kafdrop): http://localhost:9000
# MongoDB UI: http://localhost:8888
# Grafana: http://localhost:3001 (traces + logs + metrics)
# ============================================================

networks:
  middleware-net:
    driver: bridge

volumes:
  mongo-data:
  kafka-data:
  grafana-data:
  loki-data:
  tempo-data:
  prometheus-data:
  sqlserver-data:

services:

  # ──────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: zookeeper
    networks: [middleware-net]
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Explicitly bound JVM heap for ZooKeeper
      ZOOKEEPER_HEAP_SIZE: 256
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 384m

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    networks: [middleware-net]
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      # Explicitly bound JVM heap — leaves ~256 MiB for non-heap (metaspace, threads, NIO buffers) within the 1.5g container limit
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx768m"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1.5g

  kafka-setup:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka-setup
    networks: [middleware-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.commands.issue-policy --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events.policy-issuance-initiated --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer.events.account-lookup-requested --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic compliance.commands.request-compliance-check --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic compliance.events.compliance-cleared --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic compliance.events.compliance-blocked --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer.commands.get-or-create-account-record --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer.commands.update-customer-record --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer.events.account-service-record-retrieved --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer.events.customer-updated --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events.issue-policy-requested --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events.policy-issued --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events.issuance-failed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic billing.commands.associate-billing-account --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic billing.events.billing-association-created --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic integration.events.policy-admin-system-response-received --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic integration.events.policy-admin-system-call-failed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.commands.publish-notification-intent --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.events.notification-dispatched --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.events.renewal-record-ready-for-issuance --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.events.file-batch-started --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.events.file-batch-progress-updated --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.events.file-batch-completed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.events.file-batch-partial-failure --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events.renewal-record-processed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.events.renewal-record-failed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.appraisal-received --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.producer-lookup-requested --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.producer-crossref-retrieved --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.pluw-appraisal-create-requested --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.pluw-appraisal-created --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.uw-determination-requested --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.uw-assignment-determined --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.appraisal-uw-assigned --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.appraisal-completed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.events.appraisal-status-update-failed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic prs.dlq.appraisal-saga-failures --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer.dlq.producer-lookup --partitions 3 --replication-factor 1
        echo "All topics created."
    restart: on-failure

  kafka-ui:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: kafka-ui
    networks: [middleware-net]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx128M"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/ > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 384m

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./observability/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_DATABASE: admin
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 1g

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    networks: [middleware-net]
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8888:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH: "false"
    healthcheck:
      # BusyBox wget resolves 'localhost' to ::1 (IPv6) but Node.js binds IPv4 only — use 127.0.0.1 explicitly
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 128m


  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "AIS_Middleware_2024!"
      MSSQL_PID: Developer
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'AIS_Middleware_2024!' -Q 'SELECT 1' -No > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 2g

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-init
    networks: [middleware-net]
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for i in 1 2 3 4 5; do
          /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'AIS_Middleware_2024!' -No -l 15 -Q "IF DB_ID('middleware_nsb') IS NULL CREATE DATABASE middleware_nsb;" \
          && /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'AIS_Middleware_2024!' -No -l 15 -d middleware_nsb -Q "IF OBJECT_ID('dbo.SubscriptionRouting', 'U') IS NULL BEGIN CREATE TABLE dbo.SubscriptionRouting (QueueAddress NVARCHAR(200) NOT NULL, Endpoint NVARCHAR(200) NOT NULL, Topic NVARCHAR(200) NOT NULL, CONSTRAINT PK_SubscriptionRouting PRIMARY KEY CLUSTERED (Endpoint, Topic)); END; MERGE dbo.SubscriptionRouting AS target USING (VALUES ('dotnet-platform-compliance@[dbo]@[middleware_nsb]', 'dotnet-platform-compliance', 'Middleware.Contracts.Events.PolicyIssuanceInitiatedEvent'), ('dotnet-customer-identity@[dbo]@[middleware_nsb]', 'dotnet-customer-identity', 'Middleware.Contracts.Events.AccountLookupRequestedEvent'), ('dotnet-platform-integration@[dbo]@[middleware_nsb]', 'dotnet-platform-integration', 'Middleware.Contracts.Events.IssuePolicyRequestedEvent'), ('dotnet-policy-issuance@[dbo]@[middleware_nsb]', 'dotnet-policy-issuance', 'Middleware.Contracts.Events.AccountServiceRecordRetrievedEvent'), ('dotnet-policy-issuance@[dbo]@[middleware_nsb]', 'dotnet-policy-issuance', 'Middleware.Contracts.Events.BillingAssociationCreatedEvent'), ('dotnet-policy-issuance@[dbo]@[middleware_nsb]', 'dotnet-policy-issuance', 'Middleware.Contracts.Events.ComplianceBlockedEvent'), ('dotnet-policy-issuance@[dbo]@[middleware_nsb]', 'dotnet-policy-issuance', 'Middleware.Contracts.Events.ComplianceClearedEvent'), ('dotnet-policy-issuance@[dbo]@[middleware_nsb]', 'dotnet-policy-issuance', 'Middleware.Contracts.Events.CustomerUpdatedEvent'), ('dotnet-policy-issuance@[dbo]@[middleware_nsb]', 'dotnet-policy-issuance', 'Middleware.Contracts.Events.PolicyAdminSystemCallFailedEvent'), ('dotnet-policy-issuance@[dbo]@[middleware_nsb]', 'dotnet-policy-issuance', 'Middleware.Contracts.Events.PolicyAdminSystemResponseReceivedEvent'), ('dotnet-billing-finance@[dbo]@[middleware_nsb]', 'dotnet-billing-finance', 'Middleware.Contracts.Events.PolicyAdminSystemResponseReceivedEvent'), ('dotnet-customer-identity@[dbo]@[middleware_nsb]', 'dotnet-customer-identity', 'Middleware.Contracts.Events.PolicyAdminSystemResponseReceivedEvent')) AS source (QueueAddress, Endpoint, Topic) ON target.Endpoint = source.Endpoint AND target.Topic = source.Topic WHEN MATCHED AND target.QueueAddress <> source.QueueAddress THEN UPDATE SET QueueAddress = source.QueueAddress WHEN NOT MATCHED BY TARGET THEN INSERT (QueueAddress, Endpoint, Topic) VALUES (source.QueueAddress, source.Endpoint, source.Topic); PRINT 'middleware_nsb ready';" \
          && exit 0
          echo Retry $$i
          sleep 5
        done
        echo 'DB init failed after retries'
        exit 1



  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-collector
    networks: [middleware-net]
    restart: unless-stopped
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    command: ["--config=/etc/otel/config.yaml"]
    # Ports 4317/4318 are internal-only — services reach the collector via Docker network.
    # No host binding needed (avoids conflicts with other local OTel collectors).
    # Distroless image: no shell or wget. Health check uses the collector binary itself as a process-alive probe.
    # This confirms the container process is running; the health_check extension (port 13133) provides deeper service health.
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 256m

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    networks: [middleware-net]
    restart: unless-stopped
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "4317"        # OTel gRPC ingest (internal, routed via otel-collector)
    environment:
      # Soft Go memory limit — triggers GC before hard OOM; headroom above = container limit - this value
      GOMEMLIMIT: 650MiB
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 768m

  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    networks: [middleware-net]
    restart: unless-stopped
    volumes:
      - ./observability/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"   # Loki HTTP API (Grafana datasource)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    networks: [middleware-net]
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 512m

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    networks: [middleware-net]
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"   # Grafana web UI
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m

  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    networks: [middleware-net]
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/ready > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m

  # ──────────────────────────────────────────────────────────
  # EXTERNAL SYSTEM STUBS
  # ──────────────────────────────────────────────────────────

  duckcreek-commercial-stub:
    build:
      context: ./java
      dockerfile: stubs/duckcreek-commercial-stub/Dockerfile
    container_name: duckcreek-commercial-stub
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      SERVER_PORT: 9001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  duckcreek-personal-stub:
    build:
      context: ./java
      dockerfile: stubs/duckcreek-personal-stub/Dockerfile
    container_name: duckcreek-personal-stub
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      SERVER_PORT: 9002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9002/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  forefront-stub:
    build:
      context: ./java
      dockerfile: stubs/forefront-stub/Dockerfile
    container_name: forefront-stub
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "9003:9003"
    environment:
      SERVER_PORT: 9003
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9003/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  rsk3x3-compliance-stub:
    build:
      context: ./java
      dockerfile: stubs/rsk3x3-compliance-stub/Dockerfile
    container_name: rsk3x3-compliance-stub
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "9004:9004"
    environment:
      SERVER_PORT: 9004
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9004/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  erm7x1-account-stub:
    build:
      context: ./java
      dockerfile: stubs/erm7x1-account-stub/Dockerfile
    container_name: erm7x1-account-stub
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "9005:9005"
    environment:
      SERVER_PORT: 9005
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9005/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  crm40x1-customer-stub:
    build:
      context: ./java
      dockerfile: stubs/crm40x1-customer-stub/Dockerfile
    container_name: crm40x1-customer-stub
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "9006:9006"
    environment:
      SERVER_PORT: 9006
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9006/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  crm19x1-billing-stub:
    build:
      context: ./java
      dockerfile: stubs/crm19x1-billing-stub/Dockerfile
    container_name: crm19x1-billing-stub
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "9007:9007"
    environment:
      SERVER_PORT: 9007
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9007/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  activemq-artemis:
    image: apache/activemq-artemis:2.37.0
    container_name: activemq-artemis
    networks: [middleware-net]
    restart: unless-stopped
    ports:
      - "61616:61616"   # JMS/OpenWire
      - "8161:8161"     # Web console (DEMO: audience browses queues here)
      - "5672:5672"     # AMQP
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
      ARTEMIS_EXTRA_ARGS: "--allow-anonymous true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8161/console/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 384m

  deipde07-mq-simulator:
    build:
      context: ./java
      dockerfile: stubs/deipde07-mq-simulator/Dockerfile
    container_name: deipde07-mq-simulator
    networks: [middleware-net]
    restart: unless-stopped
